<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MTG Life Counter</title>
  <meta name="theme-color" content="#E77000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app">

    <!-- View 1: Setup -->
    <div id="view-setup" class="view active">
      <div class="setup-backdrop"></div>

      <h1 class="app-title">MTG <span>Life Counter</span></h1>

      <button class="install-btn" id="install-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v12"></path><polyline points="7 11 12 16 17 11"></polyline><path d="M5 20h14"></path></svg>
        Instalar App
      </button>

      <div class="setup-card">

        <div class="setup-section">
          <h2>Formato</h2>
          <div class="select-field">
            <select id="format-select">
              <option value="standard">Standard</option>
              <option value="commander">Commander</option>
            </select>
            <svg class="select-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
        </div>

        <div class="setup-section">
          <h2>Vida Inicial: <span id="life-value">40</span></h2>
          <div class="pill-group" id="life-pills">
            <div class="pill arcane" data-val="20">20</div>
            <div class="pill arcane" data-val="25">25</div>
            <div class="pill arcane" data-val="30">30</div>
            <div class="pill arcane active" data-val="40">40</div>
            <div class="pill arcane" data-val="50">50</div>
            <div class="pill arcane" data-val="60">60</div>
          </div>
          <div class="life-fine-adjust">
            <button type="button" class="stepper-btn" id="life-minus" title="-5">−</button>
            <span class="life-fine-hint">ajuste fino (20–80)</span>
            <button type="button" class="stepper-btn" id="life-plus" title="+5">+</button>
          </div>
        </div>

        <div class="setup-section">
          <h2>Qtd. Jogadores</h2>
          <div class="pill-group" id="player-pills">
            <div class="pill arcane" data-val="2">2</div>
            <div class="pill arcane" data-val="3">3</div>
            <div class="pill arcane active" data-val="4">4</div>
            <div class="pill arcane" data-val="5">5</div>
            <div class="pill arcane" data-val="6">6</div>
          </div>
        </div>

        <div class="setup-section">
          <h2>Orientação</h2>
          <div class="orientation-row">
            <div class="pill-group" id="rotation-pills">
              <div class="pill arcane icon-pill active" data-val="auto" title="Rotação automática por assento">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"></path><polyline points="21 3 21 9 15 9"></polyline></svg>
              </div>
              <div class="pill arcane icon-pill" data-val="upright" title="Todos eretos (tela compartilhada)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"></rect><line x1="4" y1="12" x2="20" y2="12"></line></svg>
              </div>
            </div>
            <button class="icon-toggle-btn active" id="sound-toggle" title="Som">
              <svg class="icon-sound-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 9 7 9 11 5 11 19 7 15 3 15"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18 6a9 9 0 0 1 0 12"></path></svg>
              <svg class="icon-sound-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 9 7 9 11 5 11 19 7 15 3 15"></polygon><line x1="16" y1="9" x2="22" y2="15"></line><line x1="22" y1="9" x2="16" y2="15"></line></svg>
            </button>
          </div>
        </div>

        <button class="start-btn" id="start-btn">Consultar o Oráculo</button>
      </div>
    </div>

    <!-- View 2: Oracle (multi-etapa) -->
    <div id="view-oracle" class="view">
      <div class="oracle-orb" id="oracle-orb">
        <div class="oracle-face"></div>
      </div>
      <h2 id="oracle-text">O Oráculo aguarda...</h2>
      <p id="oracle-subtext" class="oracle-subtext">Toque para sortear os decks</p>

      <div id="oracle-deck-list" class="oracle-deck-list"></div>

      <button class="start-btn oracle-btn" id="oracle-action-btn">Invocar o Oráculo</button>
    </div>

    <!-- View 3: Match -->
    <div id="view-match" class="view">
      <div id="match-grid" class="match-grid"></div>

      <div id="radial-menu-container">
        <svg id="radial-wedges" class="radial-wedges" viewBox="-120 -120 240 240"></svg>
        <div class="radial-center-btn" onclick="UI.toggleMenu()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </div>
      </div>

      <div id="match-end-overlay">
        <h1 id="match-end-title"></h1>
        <p id="match-end-subtitle"></p>
        <button id="match-end-btn">Nova Partida</button>
      </div>
    </div>

    <!-- Modal genérico (edição de vida, jogadores, dado/coin, menu expansível) -->
    <div id="modal-overlay" class="modal-overlay">
      <div class="modal-card" id="modal-card" role="dialog" aria-modal="true">
        <h3 class="modal-title" id="modal-title"></h3>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-actions" id="modal-actions"></div>
      </div>
    </div>

  </div>

  <script src="js/dice.js"></script>
  <script src="js/oracle.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW falhou:', err));
      });
    }
  </script>
</body>
</html>
